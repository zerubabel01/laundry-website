<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#0E5C63">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
    <title>My Profile - Laundry Service Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    <script>
        (function () {
            var saved = localStorage.getItem('theme');
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body>

    {% include "_navbar.html" %}

    <div class="dashboard-content">
        <h1>My Profile</h1>
        <p class="subtitle">Manage your account settings.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-box">
                    {% for message in messages %}
                        <p>{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <!-- Account info -->
        <div class="order-form-card">
            <h2>Account Info</h2>
            <p class="info-row"><strong>Username:</strong> {{ username }}</p>
        </div>

        <!-- Change password -->
        <div class="order-form-card">
            <h2>Change Password</h2>
            <form method="POST" action="{{ url_for('profile') }}" class="edit-form">
                <label>Current Password</label>
                <input type="password" name="current_password" required>

                <label>New Password</label>
                <input type="password" name="new_password" required>

                <label>Confirm New Password</label>
                <input type="password" name="confirm_password" required>

                <div class="edit-form-buttons">
                    <button type="submit">Update Password</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='theme.js') }}"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register("{{ url_for('service_worker') }}");
            });
        }
    </script>

</body>
</html>
