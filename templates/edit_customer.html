<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#0E5C63">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
    <title>Edit Customer - Laundry Service Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    <script>
        (function () {
            var saved = localStorage.getItem('theme');
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body>

    {% include "_navbar.html" %}

    <div class="dashboard-content">
        <h1>Edit Customer</h1>
        <p class="subtitle">Update this customer's contact info.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-box">
                    {% for message in messages %}
                        <p>{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <div class="order-form-card">
            <form method="POST" action="{{ url_for('edit_customer', customer_id=customer['id']) }}" class="edit-form">
                <label>Full Name</label>
                <input type="text" name="name" value="{{ customer['name'] }}" required>

                <label>Phone</label>
                <input type="text" name="phone" value="{{ customer['phone'] or '' }}">

                <label>Email</label>
                <input type="email" name="email" value="{{ customer['email'] or '' }}">

                <label>Notes</label>
                <input type="text" name="notes" value="{{ customer['notes'] or '' }}">

                <div class="edit-form-buttons">
                    <button type="submit">Save Changes</button>
                    <a href="{{ url_for('customer_profile', customer_id=customer['id']) }}" class="cancel-link">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='theme.js') }}"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register("{{ url_for('service_worker') }}");
            });
        }
    </script>

</body>
</html>
